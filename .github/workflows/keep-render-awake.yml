name: Keep Render Awake

on:
  schedule:
    # GitHub Actions scheduled workflows use UTC.
    # Every 10 minutes is enough to stay below Render's 15-minute idle sleep window.
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping SkillBridge health endpoint
        run: curl -fsS https://skill-bridge-bljo.onrender.com/api/health || true
